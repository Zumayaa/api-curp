<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso - ICATEBCS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      z-index: 5;
    }
    .login-card {
      background: var(--surface);
      width: 100%;
      max-width: 440px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: slideUp .4s cubic-bezier(.22,1,.36,1) both;
    }
    .login-header {
      background: linear-gradient(135deg, var(--guinda-dark) 0%, var(--guinda) 60%, var(--guinda-light) 100%);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
    }
    .login-header::after {
      content: '';
      position: absolute; right: -40px; top: -40px;
      width: 180px; height: 180px; border-radius: 50%;
      background: rgba(255,255,255,.04);
      pointer-events: none;
    }
    .login-logo-ring {
      width: 68px; height: 68px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 6px rgba(201,168,76,.12);
    }
    .login-logo-ring svg { width: 34px; height: 34px; fill: var(--gold-light); }
    
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700;
      color: #fff; line-height: 1.2;
    }
    .login-subtitle {
      font-size: .75rem; font-weight: 300;
      color: rgba(255,255,255,.7); letter-spacing: .05em; text-transform: uppercase;
      margin-top: .4rem;
    }
    .login-body {
      padding: 2.5rem 2rem;
    }
    .toggle-pwd {
      position: absolute; right: 1rem;
      color: #bbb; cursor: pointer;
      transition: color .2s;
      background: none; border: none;
      display: flex; align-items: center;
    }
    .toggle-pwd:hover { color: var(--guinda); }
    .btn-full { width: 100%; justify-content: center; margin-top: 1.5rem; padding: 1rem; }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <div class="login-wrapper">
    <div class="login-card">
      
      <div class="login-header">
        <div class="login-logo-ring">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm0 2.18l7.46 4.06L12 13.24 4.54 9.24 12 5.18zM5 13.18v4l7 3.82 7-3.82v-4l-7 3.82-7-3.82z"/>
          </svg>
        </div>
        <h1 class="login-title">Instituto de Capacitación para los Trabajadores del Estado de B.C.S.</h1>
        <p class="login-subtitle">Acceso al Sistema ICATEBCS</p>
      </div>
      <div class="gold-line"></div>

      <div class="login-body">
        <form id="loginForm">
          
          <div style="margin-bottom: 1.25rem;">
            <label class="search-label" for="username">Usuario</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input id="username" class="curp-input with-icon" type="text" placeholder="Ingresa el usuario" autocomplete="off" spellcheck="false" />
            </div>
          </div>

          <div style="margin-bottom: 0.75rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label class="search-label" style="margin: 0;" for="password">Contraseña</label>
              <a href="#" class="hint-link" style="font-size: .7rem;">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="input-icon-wrap" style="margin-top: .55rem;">
              <svg class="input-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input id="password" class="curp-input with-icon" type="password" placeholder="••••••••" />
              <button type="button" class="toggle-pwd" id="btnTogglePwd" tabindex="-1" title="Mostrar/Ocultar contraseña">
                <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="state-area" id="loginStateArea" style="display:none; margin-top: 1.25rem;"></div>

          <button type="submit" class="btn-search btn-full" id="btnSubmit">
            Iniciar sesión
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>

        </form>
      </div>

    </div>
  </div>

  <footer style="position: absolute; bottom: 0; width: 100%;">
    Sistema desarrollado para <span>ICATEBCS</span> · Control Escolar y Capacitación · BCS, México
  </footer>

  <script src="login.js"></script>
</body>
</html>
